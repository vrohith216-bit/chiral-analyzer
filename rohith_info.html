<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rohith V</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #f0f4ff;
      font-family: 'Segoe UI', Arial, sans-serif;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      padding: 60px 80px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.10);
      border: 1px solid #e0e7ff;
    }

    .label {
      font-size: 1rem;
      font-weight: 600;
      color: #6366f1;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }

    .value {
      font-size: 2rem;
      font-weight: 800;
      color: #1e1b4b;
      margin-bottom: 36px;
      letter-spacing: 1px;
    }

    .value:last-child {
      margin-bottom: 0;
    }

    hr {
      border: none;
      border-top: 2px solid #e0e7ff;
      margin: 20px 0 36px 0;
    }
  </style>
</head>
<body>

  <div class="card">

    <div class="label">Name</div>
    <div class="value">ROHITH V</div>

    <hr />

    <div class="label">Register Number</div>
    <div class="value">RA2511026050047</div>

  </div>

</body>
</html>
